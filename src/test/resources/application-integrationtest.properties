spring.datasource.url=jdbc:h2:mem:test
spring.jpa.hibernate.ddl-auto=create
spring.jpa.properties.hibernate.dialect=org.hibernate.dialect.H2Dialect
security.jwt.jwk.private-key-set-path=classpath:test-jwk.json
security.jwt.jwk.public-key-set-path=classpath:test-jwk.json
security.jwt.jwk.signing-alg=EdDSA
security.jwt.expiration-time=15m
security.refresh-token.expiration-time=24h
security.jwt.secure-cookie=false
