spring.application.name=spring-demo
spring.jpa.hibernate.ddl-auto=validate
spring.jpa.properties.hibernate.dialect=org.hibernate.dialect.PostgreSQLDialect
spring.datasource.url=jdbc:postgresql://${POSTGRES_HOSTNAME}:5432/${POSTGRES_DB}
spring.datasource.username=${POSTGRES_USER}
spring.datasource.password=${POSTGRES_PASSWORD}
spring.threads.virtual.enabled=true
security.jwt.expiration-time=15m
security.jwt.secure-cookie=true
security.refresh-token.expiration-time=30d
security.refresh-token.delete-after=24h
security.refresh-token.length=48
security.refresh-token.cleanup-cron=0 0 2 * * *
spring.datasource.hikari.initialization-fail-timeout=0
spring.datasource.hikari.connection-timeout=30000
spring.datasource.hikari.validation-timeout=5000
